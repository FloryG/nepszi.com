<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>
    <link rel="stylesheet" href="styles.css">
    <style> 
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px;
            background-color: white;
            position: fixed;
            width: 100%;
            top: 0;
            transition: box-shadow 0.3s;
            z-index: 1000;
        }
        .navbar.scrolled {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: space-evenly;
        }
        .navbar ul li {
            display: inline;
        }
        .navbar ul li a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            transition: text-shadow 0.3s, transform 0.3s;
            padding: 5px 10px;
        }
        .navbar ul li a:hover {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
        .navbar .logo a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .navbar .logo img {
            height: 95px; /* Adjust the height as needed */
        }
        .navbar .apply-button a {
            text-decoration: none;
            color: white;
            background-color: black;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, text-shadow 0.3s, transform 0.3s;
        }
        .navbar .apply-button a:hover {
            background-color: gray;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="rolunk.html">Rólunk</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
        <div class="logo">
            <a href="index.html"><img src="img/logo.png" alt="Logo"></a>
        </div>
        <ul>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="szmsz.html">SZMSZ</a></li>
            <li><a href="webshop.html">Webshop</a></li>
        </ul>
    </nav>
    <main class="calendar-container">
        <div class="calendar">
            <!-- Calendar Header -->
            <div class="calendar-header">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <!-- Calendar Body -->
            <div class="calendar-body">
                <!-- Days from previous month -->
                <div class="day prev-month">29</div>
                <div class="day prev-month">30</div>
                <div class="day prev-month">31</div>
                <!-- Current month days -->
                <div class="day" data-info="Event: Meeting with Bob at 10 AM">1</div>
                <div class="day">2</div>
                <div class="day">3</div>
                <div class="day">4</div>
                <div class="day" data-info="Event: Lunch with Alice at 12 PM">5</div>
                <div class="day">6</div>
                <div class="day">7</div>
                <div class="day">8</div>
                <div class="day">9</div>
                <div class="day">10</div>
                <div class="day">11</div>
                <div class="day">12</div>
                <div class="day">13</div>
                <div class="day">14</div>
                <div class="day">15</div>
                <div class="day">16</div>
                <div class="day">17</div>
                <div class="day">18</div>
                <div class="day">19</div>
                <div class="day">20</div>
                <div class="day">21</div>
                <div class="day">22</div>
                <div class="day">23</div>
                <div class="day">24</div>
                <div class="day">25</div>
                <div class="day">26</div>
                <div class="day">27</div>
                <div class="day">28</div>
                <div class="day">29</div>
                <div class="day">30</div>
                <div class="day">31</div>
                <!-- Days from next month -->
                <div class="day next-month">1</div>
                <div class="day next-month">2</div>
                <div class="day next-month">3</div>
            </div>
        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
